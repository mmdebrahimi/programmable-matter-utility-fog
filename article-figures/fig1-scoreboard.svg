<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400" font-family="Helvetica,Arial,sans-serif">
  <rect width="760" height="400" fill="#ffffff"/>
  <text x="30" y="36" font-size="22" font-weight="700" fill="#111">How the 7 technologies score against "utility fog"</text>
  <text x="30" y="58" font-size="13" fill="#666">Foglet-faithful rubric, 0–100. Analyst judgment; weights are adjustable (that's finding #1).</text>
  <!-- gridlines -->
  <g stroke="#e6e6e6" stroke-width="1">
    <line x1="250" y1="80" x2="250" y2="372"/><line x1="370" y1="80" x2="370" y2="372"/>
    <line x1="490" y1="80" x2="490" y2="372"/><line x1="610" y1="80" x2="610" y2="372"/><line x1="730" y1="80" x2="730" y2="372"/>
  </g>
  <g font-size="11" fill="#999" text-anchor="middle">
    <text x="250" y="388">25</text><text x="370" y="388">50</text><text x="490" y="388">75</text><text x="610" y="388">100</text>
  </g>
  <!-- bars: x0=130, scale 4.8 px per point -->
  <g font-size="13" fill="#111">
    <!-- drones 95 -->
    <text x="122" y="99" text-anchor="end">Drone swarms</text>
    <rect x="130" y="86" width="456" height="20" fill="#9ecae1"/><text x="592" y="101" font-weight="700">95</text>
    <!-- modular 87.5 (highlight) -->
    <text x="122" y="131" text-anchor="end">Modular self-reconfig robots</text>
    <rect x="130" y="118" width="420" height="20" fill="#2171b5"/><text x="556" y="133" font-weight="700">87.5</text>
    <!-- acoustic 72.5 -->
    <text x="122" y="163" text-anchor="end">Acoustic / field assembly</text>
    <rect x="130" y="150" width="348" height="20" fill="#6baed6"/><text x="484" y="165" font-weight="700">72.5</text>
    <!-- micro 56.25 -->
    <text x="122" y="195" text-anchor="end">Field micro-robots</text>
    <rect x="130" y="182" width="270" height="20" fill="#bdd7e7"/><text x="406" y="197" font-weight="700">56.25</text>
    <!-- smart dust 55 -->
    <text x="122" y="227" text-anchor="end">Smart dust</text>
    <rect x="130" y="214" width="264" height="20" fill="#bdd7e7"/><text x="400" y="229" font-weight="700">55</text>
    <!-- DNA 52.5 -->
    <text x="122" y="259" text-anchor="end">DNA nanotech</text>
    <rect x="130" y="246" width="252" height="20" fill="#bdd7e7"/><text x="388" y="261" font-weight="700">52.5</text>
    <!-- 4D 50 -->
    <text x="122" y="291" text-anchor="end">4D printing</text>
    <rect x="130" y="278" width="240" height="20" fill="#bdd7e7"/><text x="376" y="293" font-weight="700">50</text>
  </g>
  <text x="130" y="340" font-size="12" fill="#666">Drones lead on capability but don't fuse into a shape; modular robots (dark bar) are the most</text>
  <text x="130" y="356" font-size="12" fill="#666">foglet-faithful — they differ from drones on one gate (speed). Neither is "tiny." See Fig. 2.</text>
</svg>
