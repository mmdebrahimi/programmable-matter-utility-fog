<svg xmlns="http://www.w3.org/2000/svg" width="760" height="490" viewBox="0 0 760 490" font-family="Helvetica,Arial,sans-serif">
  <rect width="760" height="490" fill="#ffffff"/>
  <text x="30" y="34" font-size="22" font-weight="700" fill="#111">The corner isn't empty — biology is already in it</text>
  <text x="30" y="55" font-size="13" fill="#666">Plotting unit size against onboard autonomy. The limit is not physical: it binds ENGINEERED units only.</text>

  <!-- axes -->
  <line x1="110" y1="90" x2="110" y2="400" stroke="#333" stroke-width="1.5"/>
  <line x1="110" y1="400" x2="710" y2="400" stroke="#333" stroke-width="1.5"/>
  <text x="410" y="440" font-size="13" fill="#333" text-anchor="middle">Unit size:  large (cm) &#8594; small (µm / nm)</text>
  <text x="34" y="245" font-size="13" fill="#333" text-anchor="middle" transform="rotate(-90 34 245)">Onboard autonomy:  low &#8594; high</text>

  <!-- ENGINEERED-ONLY limit (not a law of nature) -->
  <polygon points="340,90 710,90 710,290" fill="#e34a33" fill-opacity="0.10"/>
  <line x1="340" y1="90" x2="710" y2="290" stroke="#e34a33" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="452" y="128" font-size="13" fill="#c0392b" font-weight="700">CMOS + actuator limit</text>
  <text x="452" y="145" font-size="11" fill="#c0392b">(engineering, NOT physics —</text>
  <text x="452" y="160" font-size="11" fill="#c0392b">our demand doesn't shrink)</text>

  <g font-size="13" fill="#111">
    <!-- modular robots -->
    <circle cx="190" cy="140" r="8" fill="#2171b5"/>
    <text x="204" y="137">Modular robots</text>
    <text x="204" y="153" font-size="11" fill="#666">cm-scale, autonomous — right architecture, wrong scale</text>
    <!-- acoustic -->
    <circle cx="360" cy="330" r="8" fill="#6baed6"/>
    <text x="374" y="327">Acoustic assembly</text>
    <text x="374" y="343" font-size="11" fill="#666">mm beads, passive</text>
    <!-- micro robots -->
    <circle cx="560" cy="345" r="8" fill="#41ab5d"/>
    <text x="560" y="368" text-anchor="middle" font-size="11" fill="#666">Field micro-robots</text>
    <text x="560" y="382" text-anchor="middle" font-size="10" fill="#999">µm, externally driven</text>
    <!-- DNA -->
    <circle cx="655" cy="318" r="8" fill="#807dba"/>
    <text x="655" y="303" text-anchor="middle" font-size="11" fill="#666">DNA nanotech</text>
    <text x="655" y="289" text-anchor="middle" font-size="10" fill="#999">nm, 10¹², wet + static</text>

    <!-- Miskin robot: engineered, right at the limit -->
    <circle cx="600" cy="255" r="7" fill="#fb8d3d"/>
    <text x="600" y="240" text-anchor="middle" font-size="11" fill="#b35900">Miskin robot 200 µm</text>
    <text x="600" y="227" text-anchor="middle" font-size="10" fill="#999">hugs the subthreshold floor</text>

    <!-- THE EXISTENCE PROOF -->
    <circle cx="648" cy="140" r="11" fill="#1a9850"/>
    <text x="648" y="112" text-anchor="middle" font-size="14" font-weight="700" fill="#1a9850">PROCHLOROCOCCUS</text>
    <text x="648" y="128" text-anchor="middle" font-size="11" fill="#1a9850">0.6 µm · sunlight-powered · 10²⁷ of them</text>
    <text x="648" y="163" text-anchor="middle" font-size="10.5" fill="#1a9850">~123× power margin</text>
  </g>

  <text x="120" y="418" font-size="11" fill="#666">Life sits INSIDE the "forbidden" corner: supply ∝ L² but a cell's demand ∝ L³, so shrinking makes its power budget EASIER (∝ 1/L).</text>
  <text x="120" y="434" font-size="10.5" fill="#999">Corrected 2026-07-16: the earlier version of this figure showed this corner as physically empty. That was wrong — see Part F.</text>
</svg>
