<svg xmlns="http://www.w3.org/2000/svg" width="760" height="470" viewBox="0 0 760 470" font-family="Helvetica,Arial,sans-serif">
  <rect width="760" height="470" fill="#ffffff"/>
  <text x="30" y="34" font-size="22" font-weight="700" fill="#111">The autonomy-vs-size wall: why "utility fog" is empty</text>
  <text x="30" y="55" font-size="13" fill="#666">Onboard power scales with surface area (∝ L²), so self-powered autonomy can't fit below ~mm.</text>

  <!-- axes -->
  <line x1="110" y1="90" x2="110" y2="400" stroke="#333" stroke-width="1.5"/>
  <line x1="110" y1="400" x2="710" y2="400" stroke="#333" stroke-width="1.5"/>
  <text x="410" y="440" font-size="13" fill="#333" text-anchor="middle">Unit size:  large (cm) &#8594; small (µm / nm)</text>
  <text x="34" y="245" font-size="13" fill="#333" text-anchor="middle" transform="rotate(-90 34 245)">Onboard autonomy:  low &#8594; high</text>

  <!-- forbidden zone: small AND high-autonomy (top-right), bounded by the L^2 wall diagonal -->
  <polygon points="340,90 710,90 710,290" fill="#e34a33" fill-opacity="0.13"/>
  <line x1="340" y1="90" x2="710" y2="290" stroke="#e34a33" stroke-width="2" stroke-dasharray="2 0"/>
  <text x="500" y="140" font-size="13" fill="#c0392b" font-weight="700">autonomy-vs-size wall</text>
  <text x="500" y="158" font-size="12" fill="#c0392b">(power &#8733; L²) — forbidden</text>

  <!-- data points -->
  <g font-size="13" fill="#111">
    <!-- modular robots: large + high autonomy (allowed, top-left) -->
    <circle cx="190" cy="140" r="8" fill="#2171b5"/>
    <text x="204" y="137">Modular robots</text>
    <text x="204" y="153" font-size="11" fill="#666">cm-scale, autonomous — "right architecture, wrong scale"</text>
    <!-- acoustic: mm beads, passive -->
    <circle cx="360" cy="330" r="8" fill="#6baed6"/>
    <text x="374" y="327">Acoustic assembly</text>
    <text x="374" y="343" font-size="11" fill="#666">mm beads, passive (no onboard autonomy)</text>
    <!-- micro robots: µm, externally driven -->
    <circle cx="560" cy="340" r="8" fill="#41ab5d"/>
    <text x="560" y="365" text-anchor="middle" font-size="11" fill="#666">Field micro-robots</text>
    <text x="560" y="380" text-anchor="middle" font-size="10" fill="#999">µm, externally driven</text>
    <!-- DNA: nm, static/low autonomy -->
    <circle cx="650" cy="305" r="8" fill="#807dba"/>
    <text x="650" y="290" text-anchor="middle" font-size="11" fill="#666">DNA nanotech</text>
    <text x="650" y="276" text-anchor="middle" font-size="10" fill="#999">nm, 10¹², wet + static</text>
    <!-- utility fog target: small + high autonomy (inside forbidden zone) -->
    <circle cx="625" cy="150" r="13" fill="none" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="4 3"/>
    <text x="625" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#c0392b">UTILITY FOG</text>
    <text x="625" y="133" text-anchor="middle" font-size="11" fill="#c0392b">needs: tiny + autonomous + vast</text>
  </g>

  <text x="120" y="418" font-size="11" fill="#999">Nothing occupies the top-right: you can be autonomous+open-air (and big), or tiny+vast (and wet or remote-driven) — not both.</text>
</svg>
